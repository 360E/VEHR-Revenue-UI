services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: vehr
      POSTGRES_PASSWORD: vehr
      POSTGRES_DB: vehr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehr -d vehr"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
