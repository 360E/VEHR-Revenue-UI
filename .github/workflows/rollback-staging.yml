name: Rollback Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to redeploy to staging
        required: true
        type: string

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: vehrrevostagingacr.azurecr.io
  IMAGE_NAME: vehr-revenue-ui
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINER_APP_NAME: vehr-revenue-ui-staging-eus2
  HEALTH_CHECK_URL: https://staging.360-encompass.com/api/health
  MAX_PROVISIONING_ATTEMPTS: "12"
  MAX_HEALTH_ATTEMPTS: "6"

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Compute image reference
        id: image
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          image_ref="${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "image_ref=$image_ref" >> "$GITHUB_OUTPUT"

      - name: Deploy container app image
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$CONTAINER_APP_NAME" \
            --image "${{ steps.image.outputs.image_ref }}"

      - name: Wait for deployment to settle
        run: |
          for attempt in $(seq 1 "$MAX_PROVISIONING_ATTEMPTS"); do
            provisioning_state="$(az containerapp show \
              --resource-group "$RESOURCE_GROUP" \
              --name "$CONTAINER_APP_NAME" \
              --query properties.provisioningState \
              --output tsv)"
            echo "Provisioning state attempt ${attempt}: ${provisioning_state}"
            if [ "$provisioning_state" = "Succeeded" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Container app did not reach Succeeded provisioning state in time." >&2
          exit 1

      - name: Run post-rollback health check
        run: |
          response_headers="$(mktemp)"
          trap 'rm -f "$response_headers"' EXIT
          for attempt in $(seq 1 "$MAX_HEALTH_ATTEMPTS"); do
            : > "$response_headers"
            if curl -sS -i --max-time 30 -o /dev/null -D "$response_headers" "$HEALTH_CHECK_URL"; then
              cat "$response_headers"
              status_code="$(awk 'BEGIN { code="" } $1 ~ /^HTTP/ { code=$2 } END { print code }' "$response_headers")"
              if [ -n "$status_code" ] && [ "$status_code" = "200" ]; then
                exit 0
              fi
              echo "Health check attempt ${attempt} returned HTTP ${status_code:-unknown}" >&2
            else
              cat "$response_headers"
              echo "Health check attempt ${attempt} failed to reach ${HEALTH_CHECK_URL}" >&2
            fi
            sleep 10
          done
          echo "Health check did not return HTTP 200 in time." >&2
          exit 1

      - name: Report rolled back image
        run: 'echo "Rolled back image: ${{ steps.image.outputs.image_ref }}"'
