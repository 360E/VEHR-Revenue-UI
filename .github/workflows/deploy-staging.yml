name: Deploy VEHR Revenue OS (Staging)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: vehr-revos-staging-rg
  CONTAINERAPP_NAME: vehr-revos-staging
  ACR_NAME: vehrrevostagingacr
  IMAGE_NAME: vehr-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            -r $ACR_NAME \
            -t $IMAGE_NAME:${{ github.sha }} \
            .

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            -g $RESOURCE_GROUP \
            -n $CONTAINERAPP_NAME \
            --image $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
